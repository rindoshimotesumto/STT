<!DOCTYPE html>

<html data-theme="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>STT Service</title>
<link href="{{ url_for('assets', path='css/style.css') }}" rel="stylesheet"/>
</head>
<body>
<main class="app">
<div class="toolbar">
<button aria-label="Toggle theme" class="toolbar-btn" id="themeToggle" type="button">
<svg id="themeIcon" viewbox="0 0 24 24">
<path d="M12 3v1"></path>
<path d="M12 20v1"></path>
<path d="M4.22 4.22l.7.7"></path>
<path d="M19.08 19.08l.7.7"></path>
<path d="M3 12h1"></path>
<path d="M20 12h1"></path>
<path d="M4.22 19.78l.7-.7"></path>
<path d="M19.08 4.92l.7-.7"></path>
<circle cx="12" cy="12" r="4"></circle>
</svg>
</button>
<div aria-label="Language" class="lang-menu" id="langMenu">
<button aria-label="Open language menu" class="lang-toggle" id="langToggle" type="button">EN</button>
<div class="lang-options">
<button class="lang-btn" data-lang="en" type="button">EN</button>
<button class="lang-btn" data-lang="ru" type="button">RU</button>
<button class="lang-btn" data-lang="uz" type="button">UZ</button>
</div>
</div>
<div class="a11y-wrap" id="a11yWrap">
<button aria-expanded="false" aria-label="Accessibility settings" class="toolbar-btn" id="a11yToggle" type="button">
<svg aria-hidden="true" viewbox="0 0 24 24">
<circle cx="12" cy="4" r="2"></circle>
<path d="M4 8h16"></path>
<path d="M12 10v10"></path>
<path d="M8 20l4-10 4 10"></path>
</svg>
</button>
<div aria-label="Accessibility settings panel" class="a11y-panel" id="a11yPanel">
<div class="a11y-row">
<span class="a11y-label">
<span data-i18n="fontSize">Text size</span>: <span class="a11y-value" id="fontSizeValue">14px</span>
</span>
<div aria-label="Text size controls" class="a11y-stepper">
<button aria-label="Decrease text size" class="a11y-mini-btn" id="fontDecreaseBtn" type="button">−</button>
<button aria-label="Increase text size" class="a11y-mini-btn" id="fontIncreaseBtn" type="button">+</button>
</div>
</div>
<button class="a11y-toggle-row" id="contrastToggleBtn" type="button">
<span data-i18n="contrast">Contrast</span>
<span class="a11y-value" data-i18n="contrastOff" id="contrastToggleText">Off</span>
</button>
</div>
</div>
</div>
<section class="header">
<div class="title-row">
<div aria-hidden="true" class="logo">
<svg viewbox="0 0 24 24">
<path d="M12 3v18"></path>
<path d="M7 8v8"></path>
<path d="M17 8v8"></path>
<path d="M3 10v4"></path>
<path d="M21 10v4"></path>
</svg>
</div>
<h1 data-i18n="title">Speech to Text</h1>
</div>
<p class="subtitle" data-i18n="subtitle">
        Upload an audio file to get a text transcription.
      </p>
</section>
<div aria-label="Input method" class="input-switch">
<button class="mode-btn active" data-i18n="uploadMode" id="uploadModeBtn" type="button">Upload file</button>
<button class="mode-btn" data-i18n="recordMode" id="recordModeBtn" type="button">Record audio</button>
</div>
<section class="card" id="uploadPanel">
<label class="dropzone" id="dropzone">
<input accept=".mp3,.wav,.m4a,.aac,.ogg,.flac,.webm,audio/mpeg,audio/wav,audio/x-wav,audio/mp4,audio/aac,audio/ogg,audio/flac,audio/webm" id="fileInput" type="file"/>
<input accept=".mp3,.wav,.m4a,.aac,.ogg,.flac,.webm,audio/mpeg,audio/wav,audio/x-wav,audio/mp4,audio/aac,audio/ogg,audio/flac,audio/webm" capture="" id="audioCaptureInput" type="file"/>
<div class="drop-content">
<div aria-hidden="true" class="icon">
<svg viewbox="0 0 24 24">
<path d="M12 16V4"></path>
<path d="M8 8l4-4 4 4"></path>
<path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"></path>
</svg>
</div>
<div>
<div class="drop-title" data-i18n="dropTitle">Drop audio here</div>
<div class="drop-text" data-i18n="dropText">or click to choose a file</div>
</div>
</div>
</label>
</section>
<section class="card panel-hidden" id="recordPanel">
<div class="recordzone" id="recordZone" role="button" tabindex="0">
<div class="record-hover-label"><span data-i18n="recordHover">Record</span></div>
<div class="record-content">
<div aria-hidden="true" class="icon record-idle">
<svg viewbox="0 0 24 24">
<path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
<path d="M19 11a7 7 0 0 1-14 0"></path>
<path d="M12 18v3"></path>
<path d="M8 21h8"></path>
</svg>
</div>
<div class="record-idle">
<div class="drop-title" data-i18n="recordTitle">Record in browser</div>
<div class="drop-text" data-i18n="recordText">Maximum recording length is 30 seconds</div>
</div>
<button class="record-btn" data-i18n="recordBtn" id="recordBtn" tabindex="-1" type="button">Record</button>
<div aria-live="polite" class="record-controls" id="recordControls">
<div class="record-session">
<div class="record-timer" id="recordTimer"><span class="timer-current">00:00</span><span class="timer-total">/ 00:30</span></div>
<div aria-hidden="true" class="voice-bars" id="voiceBars">
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
<span class="voice-bar"></span>
</div>
<div class="record-actions">
<button class="record-control-btn" data-i18n="pauseRecordBtn" id="pauseRecordBtn" type="button">Pause</button>
<button class="record-control-btn stop" data-i18n="stopRecordBtn" id="stopRecordBtn" type="button">Stop</button>
</div>
</div>
</div>
</div>
</div>
</section>
<div class="file-info" id="fileInfo">
<div class="file-main">
<div class="file-meta-row">
<div>
<div class="file-name" id="fileName"></div>
<div class="file-size" id="fileSize"></div>
</div>
<button aria-label="Remove file" class="remove-btn" id="removeBtn" type="button">
            ✕
          </button>
</div>
<div class="clean-player" id="cleanPlayer">
<audio class="audio-player" id="audioPlayer" preload="metadata"></audio>
<button aria-label="Play audio" class="player-btn" id="playerPlayBtn" type="button">
<svg id="playerPlayIcon" viewbox="0 0 24 24">
<path d="M8 5v14l11-7-11-7Z"></path>
</svg>
</button>
<div class="player-progress" id="playerProgress">
<div class="player-progress-fill" id="playerProgressFill"></div>
</div>
<div class="player-time" id="playerTime">00:00 / 00:00</div>
<button aria-label="Download audio" class="player-download-btn" disabled="" id="downloadAudioBtn" title="Download audio" type="button">
<svg aria-hidden="true" viewbox="0 0 24 24">
<path d="M12 3v12"></path>
<path d="M8 11l4 4 4-4"></path>
<path d="M5 21h14"></path>
</svg>
</button>
</div>
</div>
</div>
<div class="actions">
<button class="action-button status-mode" disabled="" id="transcribeBtn" type="button">
<span aria-hidden="true" class="button-status-dot"></span>
<span class="status" id="status">Waiting for file</span>
</button>
</div>
<section class="output">
<div class="output-head">
<div class="output-actions">
<button aria-label="Copy result" class="copy-btn" disabled="" id="copyResultBtn" title="Copy" type="button">
<svg aria-hidden="true" viewbox="0 0 24 24">
<rect height="11" rx="2" width="11" x="9" y="9"></rect>
<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
</svg>
<span data-i18n="copyResult" id="copyResultText">Copy</span>
</button>
<button aria-label="Download result" class="download-btn" disabled="" id="downloadResultBtn" title="Download" type="button">
<svg aria-hidden="true" viewbox="0 0 24 24">
<path d="M12 3v12"></path>
<path d="M8 11l4 4 4-4"></path>
<path d="M5 21h14"></path>
</svg>
<span data-i18n="downloadResult" id="downloadResultText">Download</span>
</button>
</div>
</div>
<div class="output-text placeholder" data-i18n="outputPlaceholder" id="outputText">
        The transcription result will appear here.
      </div>
</section>
</main>
<script defer="" src="{{ url_for('assets', path='js/app.js') }}"></script>
</body>
</html>
